openapi: 3.2.0
info:
  title: Secure API
  version: 1.0.0
paths:
  /me:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpecTestUser'
      security:
        - bearerAuth: []
components:
  schemas:
    SpecTestUser:
      type: object
      required:
        - id
      properties:
        id:
          type: string
        name:
          type: string
  securitySchemes:
    apiKey:
      type: apiKey
      name: X-API-Key
      in: header
    bearerAuth:
      type: http
      scheme: bearer
