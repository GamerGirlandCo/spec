openapi: 3.2.0
info:
  title: Server Var API
  version: 1.0.0
jsonSchemaDialect: https://spec.openapis.org/oas/3.1/dialect/base
servers:
  - url: https://{environment}.example.com/v1
    variables:
      environment:
        enum:
          - production
          - staging
          - dev
        default: production
        description: API environment
paths:
  /ping:
    get:
      responses:
        "204":
          description: No Content
