openapi: 3.1.0
info:
  description: This is the API documentation for Generic Response
  title: 'API Doc: Generic Response'
  version: 1.0.0
paths:
  /login:
    post:
      description: This operation allows users to log in.
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpecTestLoginRequest'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpecTestResponseToken'
          description: OK
      summary: User Login
      tags:
      - Authentication
  /nested-generic-user:
    get:
      description: This operation retrieves a nested generic user.
      operationId: getNestedGenericUser
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpecTestResponseUserType2'
          description: OK
      security:
      - bearerAuth: []
      summary: Get Nested Generic User
      tags:
      - Authentication
  /nested-generic-users:
    get:
      description: This operation retrieves a nested generic users.
      operationId: getNestedGenericUsers
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpecTestResponseUserType3'
          description: OK
      security:
      - bearerAuth: []
      summary: Get Nested Generic Users
      tags:
      - Authentication
  /user:
    get:
      description: This operation retrieves the authenticated user's profile.
      operationId: getUserProfile
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpecTestResponseUser'
          description: OK
      security:
      - bearerAuth: []
      summary: Get User Profile
      tags:
      - Authentication
  /users:
    get:
      description: This operation retrieves a list of users.
      operationId: getUsers
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpecTestResponseUserList'
          description: OK
      security:
      - bearerAuth: []
      summary: Get Users
      tags:
      - Authentication
components:
  schemas:
    SpecTestLoginRequest:
      properties:
        password:
          examples:
          - password123
          type: string
        username:
          examples:
          - john_doe
          type: string
      required:
      - username
      - password
      type: object
    SpecTestResponseToken:
      properties:
        data:
          $ref: '#/components/schemas/SpecTestToken'
        status:
          examples:
          - 200
          type: integer
      type: object
    SpecTestResponseUser:
      properties:
        data:
          $ref: '#/components/schemas/SpecTestUser'
        status:
          examples:
          - 200
          type: integer
      type: object
    SpecTestResponseUserList:
      properties:
        data:
          items:
            $ref: '#/components/schemas/SpecTestUser'
          type:
          - array
          - "null"
        status:
          examples:
          - 200
          type: integer
      type: object
    SpecTestResponseUserType2:
      properties:
        data:
          $ref: '#/components/schemas/SpecTestResponseUser'
        status:
          examples:
          - 200
          type: integer
      type: object
    SpecTestResponseUserType3:
      properties:
        data:
          $ref: '#/components/schemas/SpecTestResponseUserList'
        status:
          examples:
          - 200
          type: integer
      type: object
    SpecTestToken:
      properties:
        token:
          examples:
          - abc123
          type: string
      type: object
    SpecTestUser:
      properties:
        age:
          type:
          - "null"
          - integer
        created_at:
          format: date-time
          type: string
        email:
          type: string
        id:
          type: integer
        updated_at:
          format: date-time
          type: string
        username:
          type: string
      type: object
  securitySchemes:
    bearerAuth:
      scheme: Bearer
      type: http
tags:
- description: Operations related to user authentication
  name: Authentication
