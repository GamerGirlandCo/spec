openapi: 3.2.0
info:
  title: Search API
  version: 1.0.0
jsonSchemaDialect: https://spec.openapis.org/oas/3.1/dialect/base
paths:
  /cache:
    additionalOperations:
      PURGE:
        responses:
          "204":
            description: No Content
  /search:
    query:
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
components:
  schemas:
    User:
      type: object
      required:
        - id
      properties:
        id:
          type: string
        name:
          type: string
