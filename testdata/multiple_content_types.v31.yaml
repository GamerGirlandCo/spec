openapi: 3.1.2
info:
  title: Multi-content API
  version: 1.0.0
paths:
  /multi:
    post:
      operationId: multi
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpecTestLoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SpecTestLoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpecTestLoginResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/SpecTestLoginResponse'
components:
  schemas:
    SpecTestLoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        password:
          type: string
          writeOnly: true
        username:
          type: string
          minLength: 3
    SpecTestLoginResponse:
      type: object
      required:
        - token
      properties:
        token:
          type: string
