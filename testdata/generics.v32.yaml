openapi: 3.2.0
info:
  title: Generics API
  version: 1.0.0
paths:
  /profile:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
  /user:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponseUser'
  /users:
    post:
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponseUserList'
components:
  schemas:
    BaseResponseUser:
      type: object
      properties:
        data:
          type: object
          required:
            - id
          properties:
            id:
              type: string
            name:
              type: string
        message:
          type: string
        success:
          type: boolean
    BaseResponseUserList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        message:
          type: string
        success:
          type: boolean
    ProfileResponse:
      type: object
      properties:
        data:
          type: object
          required:
            - id
          properties:
            id:
              type: string
            name:
              type: string
        message:
          type: string
        success:
          type: boolean
    User:
      type: object
      required:
        - id
      properties:
        id:
          type: string
        name:
          type: string
