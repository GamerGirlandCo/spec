openapi: 3.2.0
info:
  title: EmbedRef API
  version: 1.0.0
paths:
  /refer-interface:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpecTestEmbedRefMixedRequest'
      responses:
        '204':
          description: No Content
  /refer-tag:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpecTestEmbedRefRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpecTestEmbedRefBase'
components:
  schemas:
    SpecTestEmbedRefBase:
      type: object
      properties:
        id:
          type: integer
          format: int32
        role:
          type: string
    SpecTestEmbedRefBaseViaInterface:
      type: object
      properties:
        tag:
          type: string
    SpecTestEmbedRefMixedRequest:
      type: object
      properties:
        code:
          type: string
        value:
          type: integer
          format: int32
      allOf:
        - $ref: '#/components/schemas/SpecTestEmbedRefBaseViaInterface'
    SpecTestEmbedRefRequest:
      type: object
      properties:
        age:
          type: integer
          format: int32
        name:
          type: string
      allOf:
        - $ref: '#/components/schemas/SpecTestEmbedRefBase'
