openapi: 3.0.4
info:
  title: Generics API
  version: 1.0.0
paths:
  /profile:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpecTestProfileResponse'
  /user:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpecTestBaseResponseUser'
  /users:
    post:
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpecTestBaseResponseUserList'
components:
  schemas:
    SpecTestBaseResponseUser:
      type: object
      properties:
        data:
          type: object
          required:
            - id
          properties:
            id:
              type: string
            name:
              type: string
        message:
          type: string
        success:
          type: boolean
    SpecTestBaseResponseUserList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/SpecTestUser'
        message:
          type: string
        success:
          type: boolean
    SpecTestProfileResponse:
      type: object
      properties:
        data:
          type: object
          required:
            - id
          properties:
            id:
              type: string
            name:
              type: string
        message:
          type: string
        success:
          type: boolean
    SpecTestUser:
      type: object
      required:
        - id
      properties:
        id:
          type: string
        name:
          type: string
