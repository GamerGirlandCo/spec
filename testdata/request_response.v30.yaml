openapi: 3.0.4
info:
  title: Login API
  version: 1.0.0
paths:
  /login:
    post:
      summary: Login
      description: Login
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpecTestLoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpecTestLoginResponse'
components:
  schemas:
    SpecTestLoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        password:
          type: string
          writeOnly: true
        username:
          type: string
          minLength: 3
    SpecTestLoginResponse:
      type: object
      required:
        - token
      properties:
        token:
          type: string
