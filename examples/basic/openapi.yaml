openapi: 3.0.4
info:
  title: My API
  version: 1.0.0
servers:
  - url: https://api.example.com
paths:
  /api/v1/login:
    post:
      summary: User login
      description: User login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
  /api/v1/users/{id}:
    get:
      summary: Get user by ID
      description: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
      security:
        - bearerAuth: []
components:
  schemas:
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        password:
          type: string
        username:
          type: string
    LoginResponse:
      type: object
      properties:
        token:
          type: string
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
  securitySchemes:
    bearerAuth:
      type: http
      scheme: Bearer
